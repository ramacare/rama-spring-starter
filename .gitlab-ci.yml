stages:
  - build
  - test
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "-B -ntp"

default:
  image:
    name: maven:3.9.11-eclipse-temurin-17
    pull_policy: always
  cache:
    key: maven-repo
    paths:
      - .m2/repository

maven_build:
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests verify
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success
  tags:
    - dkrunner-20-63-tag

maven_test:
  stage: test
  script:
    - mvn $MAVEN_CLI_OPTS test
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success
  tags:
    - dkrunner-20-63-tag
  artifacts:
    when: always
    reports:
      junit:
        - "*/target/surefire-reports/TEST-*.xml"

publish:
  stage: deploy
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - mvn $MAVEN_CLI_OPTS versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false
    - mvn $MAVEN_CLI_OPTS deploy -DskipTests -Dmaven.javadoc.skip=true -DaltDeploymentRepository=gitlab-maven::https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/maven -s ci_settings.xml
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+/'
  tags:
    - dkrunner-20-63-tag
