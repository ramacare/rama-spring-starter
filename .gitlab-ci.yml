stages:
  - build
  - test
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "-B -ntp"

default:
  image:
    name: maven:3.9.11-eclipse-temurin-17
    pull_policy: always
  cache:
    key: maven-repo
    paths:
      - .m2/repository

maven_build:
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests verify
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success
  tags:
    - dkrunner-20-63-tag

maven_test:
  stage: test
  script:
    - mvn $MAVEN_CLI_OPTS test
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success
  tags:
    - dkrunner-20-63-tag
  artifacts:
    when: always
    reports:
      junit:
        - "*/target/surefire-reports/TEST-*.xml"

pages:
  stage: deploy
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - mvn $MAVEN_CLI_OPTS versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false
    - mvn $MAVEN_CLI_OPTS deploy -DskipTests -Dmaven.javadoc.skip=true -DaltDeploymentRepository=staging::file://$(pwd)/staging
    # Restore previous pages content (preserves old versions)
    - mkdir -p public
    - git fetch origin gl-pages && git archive origin/gl-pages | tar -x -C public || true
    # Overlay new version artifacts
    - cp -r staging/* public/
    # Persist to gl-pages branch for next deployment
    - cd public
    - git init -b gl-pages
    - git add .
    - git -c user.name="CI" -c user.email="ci@gitlab" commit -m "chore: publish ${VERSION} to GitLab Pages"
    - git push --force "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" gl-pages
    - rm -rf .git
    - cd ..
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+/'
  tags:
    - dkrunner-20-63-tag
