stages:
  - build
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "-B -ntp"

default:
  image:
    name: maven:3.9.11-eclipse-temurin-17
    pull_policy: always
  cache:
    key: maven-repo
    paths:
      - .m2/repository

maven_build:
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests verify
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success
  tags:
    - dkrunner-20-63-tag

maven_test:
  stage: test
  script:
    - mvn $MAVEN_CLI_OPTS test
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success
  tags:
    - dkrunner-20-63-tag
  artifacts:
    when: always
    reports:
      junit:
        - "*/target/surefire-reports/TEST-*.xml"
