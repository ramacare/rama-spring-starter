spring.application.name=rama-spring-demo
spring.profiles.active=h2

# --- DataSource (H2 in-memory) ---
spring.datasource.url=jdbc:h2:mem:demo;MODE=LEGACY;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# --- Liquibase ---
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/db.changelog-master.yaml

# --- GraphQL ---
spring.graphql.http.path=/graphql
spring.graphql.schema.locations=classpath*:graphql/**/
spring.graphql.graphiql.enabled=true

# --- Encryption (starter requires a key when @Convert(Encrypt.class) is on classpath) ---
encrypt.key=1234567812345678

# --- Starter feature flags ---
rama.mongo.enabled=false
rama.meilisearch.enabled=false
rama.ftp.enabled=false
rama.api-key.enabled=true
rama.quartz.allowed-job-packages=org.rama.demo.job

# --- Quartz: disabled for the bootstrap/smoke profile ---
# The starter's rama-quartz-defaults.properties hard-codes JDBC-specific Quartz properties
# (isClustered, tablePrefix, lockHandler.class) that RAMJobStore rejects with
# NoSuchMethodException. Spring Boot property layering cannot *remove* a property, and
# RAMJobStore has no isClustered setter to absorb an override, so a consumer cannot simply
# switch to job-store-type=memory. Spring Boot 4.0.3's QuartzAutoConfiguration also does not
# honor a spring.quartz.enabled flag natively. Exclude the auto-config here; a later demo
# task will re-enable Quartz against a JDBC store (either H2 with QRTZ_* tables or MSSQL).
spring.autoconfigure.exclude=org.springframework.boot.quartz.autoconfigure.QuartzAutoConfiguration

# --- Spring Cloud Vault: disabled (starter bundles it; demo does not use it) ---
spring.cloud.vault.enabled=false
spring.cloud.compatibility-verifier.enabled=false

# --- Demo-specific toggles ---
demo.jobs.book-audit.enabled=false
demo.jobs.book-audit.cron=0 0/5 * * * ?

server.port=8080
